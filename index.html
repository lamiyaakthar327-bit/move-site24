<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream - Simple Movie Player</title>
    <meta name="description" content="A simple and beautiful movie site where you can play and download videos by entering a link.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="logo">Cine<span>Stream</span></h1>
            <p class="subtitle">Your Personal Movie Hub</p>
        </header>

        <main>
            <div class="input-section glass-panel">
                <h2>Play Any Movie</h2>
                <p>Paste a direct video link (e.g., .mp4, .webm) below to stream or download.</p>
                <div class="input-group">
                    <input type="url" id="videoUrlInput" placeholder="Enter video link here..." autocomplete="off">
                    <button id="loadBtn" class="primary-btn">Load Movie</button>
                </div>
            </div>

            <div class="player-section" id="playerSection" style="display: none;">
                <div class="video-container">
                    <video id="moviePlayer" controls>
                        Your browser does not support the video tag.
                    </video>
                </div>
                
                <div class="actions">
                    <div class="movie-info">
                        <h3 id="movieTitle">Custom Movie Stream</h3>
                        <p>Ready to watch</p>
                    </div>
                    <a id="downloadBtn" href="#" class="download-btn" download>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Download Movie
                    </a>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 CineStream. Beautifully crafted for you.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
